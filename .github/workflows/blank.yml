name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

  # ⭐ Daily scheduler (runs at 05:30 UTC daily)
  schedule:
    - cron: '30 5 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Cache dependencies
      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: cache-26f3ea5

      # Required step to echo cache hit/miss
      - name: prime-cache-26f3ea5
        run: echo "Cache hit? -> ${{ steps.cache-deps.outputs.cache-hit }}"

      # Existing steps
      - name: Run a one-line script
        run: echo Hello, world!

      # Required email step for the other question
      - name: 24f2006661@ds.study.iitm.ac.in
        run: echo "Hello, world!"

      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.

      # ⭐ Daily commit step (for automation tracking)
      - name: Create automated daily commit
        run: |
          git config user.name "github-actions"
          git config user.email "24f2006661@ds.study.iitm.ac.in"
          echo "Daily update: $(date)" >> daily-activity.log
          git add daily-activity.log
          git commit -m "Automated daily commit $(date)" || echo "No changes to commit"
          git push
