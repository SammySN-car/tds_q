name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Cache dependencies
      - name: Cache dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: cache-26f3ea5

      # Required step to echo cache hit/miss
      - name: prime-cache-26f3ea5
        run: echo "Cache hit? -> ${{ steps.cache-deps.outputs.cache-hit }}"

      # Existing steps
